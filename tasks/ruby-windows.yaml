---
- name: Check if Ruby is installed
  ansible.windows.win_shell: ruby --version
  register: ruby_check
  failed_when: false
  changed_when: false

- name: Install Ruby via scoop if not present
  ansible.windows.win_shell: scoop install ruby
  when: ruby_check.rc != 0

- name: Install Ruby gems from defaults
  ansible.windows.win_shell: gem install {{ item }}
  loop: "{{ ruby_gems | default([]) }}"
  ignore_errors: true
