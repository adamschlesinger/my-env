---
- name: Create PowerShell profile directory
  ansible.windows.win_file:
    path: "{{ ansible_env.USERPROFILE }}\\Documents\\PowerShell"
    state: directory

- name: Install PowerShell profile with oh-my-posh
  ansible.windows.win_copy:
    dest: "{{ ansible_env.USERPROFILE }}\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1"
    content: |
      oh-my-posh init pwsh --config "$HOME\.custom.omp.yaml" | Invoke-Expression

      # Aliases
      Set-Alias -Name k -Value kubectl -Option AllScope
      function tree { lsd --tree @args }

      # fzf
      $env:FZF_DEFAULT_OPTS = '--color=fg:#f8f8f2,bg:#282a36,hl:#bd93f9 --color=fg+:#f8f8f2,bg+:#44475a,hl+:#bd93f9 --color=info:#ffb86c,prompt:#50fa7b,pointer:#ff79c6 --color=marker:#ff79c6,spinner:#ffb86c,header:#6272a4'
